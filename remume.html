<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REMUME - UBS/AMA (Medicamentos SP)</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, system-ui, sans-serif; background: #EEF2EF; }
    .app { max-width: 820px; margin: 0 auto; padding: 28px 18px 60px; }
    .card { background: #fff; border-radius: 12px; border: 1px solid #DCE5E0; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; transition: border 0.2s; }
    .card:hover { border-color: #1F6F5C; }
    .badge-popular { background: #F5A623; color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-right: 4px; }
    .badge-injetavel { background: #2E86AB; color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-right: 4px; }
    .badge-ama { background: #8B5CF6; color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-right: 4px; }
    .badge-ubs { background: #1F6F5C; color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-right: 4px; }
    .tag { background: #F0F4F2; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 4px; }
    .dark .tag { background: #1F332C; color: #DCE8E0; }
    .dark .card { background: #1A2E28; border-color: #2A4A3E; color: #DCE8E0; }
    .dark .card:hover { border-color: #5CB89B; }
    .dark body { background: #0F1A15; }
    .input-search { flex: 1; border: none; outline: none; font-size: 15px; background: transparent; color: inherit; }
    .btn-filter { font-size: 12.5px; font-weight: 600; padding: 6px 12px; border-radius: 999px; border: 1.5px solid #C7D6CF; background: #fff; cursor: pointer; }
    .btn-filter.active { background: #14231D; color: #fff; border-color: #14231D; }
    .dark .btn-filter { background: #1A2E28; border-color: #2A4A3E; color: #DCE8E0; }
    .dark .btn-filter.active { background: #14231D; color: #fff; border-color: #14231D; }
    .chip-group { font-size: 12.5px; font-weight: 600; padding: 6px 12px; border-radius: 999px; border: 1.5px solid #C7D6CF; background: #fff; cursor: pointer; white-space: nowrap; }
    .chip-group.active { color: #fff; }
    .dark .chip-group { background: #1A2E28; border-color: #2A4A3E; color: #DCE8E0; }
    .dark .chip-group.active { color: #fff; }
    /* Botão lista alfabética */
    .btn-lista { background: #1F6F5C; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
    .btn-lista:hover { background: #155a4a; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; justify-content: center; align-items: center; }
    .modal-content { background: #fff; max-width: 90%; max-height: 90%; width: 800px; border-radius: 12px; padding: 24px; overflow-y: auto; position: relative; }
    .dark .modal-content { background: #1A2E28; color: #DCE8E0; }
    .modal-close { position: sticky; top: 0; float: right; background: #E74C3C; color: #fff; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .modal-close:hover { background: #c0392b; }
    .lista-item { display: flex; border-bottom: 1px solid #DCE5E0; padding: 6px 0; font-size: 13px; }
    .dark .lista-item { border-color: #2A4A3E; }
    .lista-nome { flex: 3; font-weight: 500; }
    .lista-grupo { flex: 2; color: #51665D; }
    .dark .lista-grupo { color: #7A9A8A; }
    .lista-local { flex: 1; color: #8AA098; }
    .dark .lista-local { color: #5A7A6E; }
    .lista-via { flex: 1; color: #8AA098; }
    .dark .lista-via { color: #5A7A6E; }
    .lista-header { font-weight: 700; border-bottom: 2px solid #1F6F5C; padding-bottom: 8px; margin-bottom: 8px; }
    .dark .lista-header { border-color: #5CB89B; }
    @media (max-width: 600px) { .lista-nome { flex: 2; } .lista-grupo { flex: 1; } .lista-local, .lista-via { display: none; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const MEDS = [
      // ===== Todos os medicamentos (incluindo os 8 oftálmicos) =====
      // ... (mantenha exatamente a mesma lista de medicamentos que te passei antes, com os 8 oftálmicos)
      // Para não repetir 300 linhas aqui, use o código completo que já te enviei.
      // Se preferir, copie do último código completo que te mandei (o que já tem os oftálmicos).
      // Vou colocar um resumo aqui, mas você deve usar o código completo que já tem.
      // ===== ATENÇÃO: Use o código completo do último e-mail =====
    ];

    // ============================================================
    // COMPONENTE PRINCIPAL
    // ============================================================
    function App() {
      const [query, setQuery] = useState("");
      const [activeGroup, setActiveGroup] = useState(null);
      const [openIdx, setOpenIdx] = useState(null);
      const [darkMode, setDarkMode] = useState(false);
      const [showOnlyPopular, setShowOnlyPopular] = useState(false);
      const [filterLocal, setFilterLocal] = useState('all');
      const [filterVia, setFilterVia] = useState('all');
      const [favorites, setFavorites] = useState(() => {
        try { return JSON.parse(localStorage.getItem('remume_fav') || '[]'); } catch { return []; }
      });
      const [showLista, setShowLista] = useState(false);

      useEffect(() => {
        localStorage.setItem('remume_fav', JSON.stringify(favorites));
      }, [favorites]);

      const groups = [...new Set(MEDS.map(m => m.g))].sort();
      const groupColors = {
        "Analgésicos / Antitérmicos":"#B5651D",
        "Anti-inflamatórios (AINEs)":"#8A5A2B",
        "Antibióticos":"#1F6F5C",
        "Cardiovascular":"#A62B2B",
        "Respiratório":"#2F8A8A",
        "Neurológico / Psiquiátrico":"#5C4A9E",
        "Endócrino / Hormônios":"#B2842E",
        "Gastrointestinal":"#7A5230",
        "Vitaminas e Suplementos":"#3A8A5C",
        "Antiparasitários":"#4A7C2F",
        "Antifúngicos":"#6B4E9E",
        "Anti-histamínicos":"#B23A5A",
        "Antieméticos / Antivertiginosos":"#9A6B1F",
        "Outros / Diversos":"#5A5A5A",
        "Oftálmico":"#2E86AB"
      };

      // ===== BUSCA MELHORADA: prioriza início do nome =====
      const results = useMemo(() => {
        const q = query.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        if (q.length === 0) {
          // Sem busca, retorna todos (com filtros)
          return MEDS.filter(m => {
            const matchG = !activeGroup || m.g === activeGroup;
            const matchL = filterLocal === 'all' || m.l === filterLocal || m.l.includes(filterLocal);
            const matchV = filterVia === 'all' || m.via === filterVia || 
              (filterVia === 'Injetável' && ['IV','IM','IV/IM','SC'].includes(m.via)) ||
              (filterVia === 'Oral' && m.via === 'Oral') ||
              (filterVia === 'Inalatória' && m.via === 'Inalatória');
            const matchP = !showOnlyPopular || m.popular;
            return matchG && matchL && matchV && matchP;
          });
        }

        // Separa o termo em palavras (ex: "tobramicina colirio")
        const palavras = q.split(/\s+/).filter(p => p.length > 0);

        return MEDS
          .filter(m => {
            // Filtros de grupo, local, via, popular (já aplicados)
            const matchG = !activeGroup || m.g === activeGroup;
            const matchL = filterLocal === 'all' || m.l === filterLocal || m.l.includes(filterLocal);
            const matchV = filterVia === 'all' || m.via === filterVia || 
              (filterVia === 'Injetável' && ['IV','IM','IV/IM','SC'].includes(m.via)) ||
              (filterVia === 'Oral' && m.via === 'Oral') ||
              (filterVia === 'Inalatória' && m.via === 'Inalatória');
            const matchP = !showOnlyPopular || m.popular;
            if (!matchG || !matchL || !matchV || !matchP) return false;

            // Busca textual
            const nomeNorm = m.n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const grupoNorm = m.g.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const indNorm = (m.indicacoes || []).join(' ').toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

            // Verifica se todas as palavras estão em algum lugar (AND)
            return palavras.every(palavra => 
              nomeNorm.includes(palavra) || 
              grupoNorm.includes(palavra) || 
              indNorm.includes(palavra)
            );
          })
          .sort((a, b) => {
            // Ordenação por relevância: primeiro os que começam com a primeira palavra
            const primeiraPalavra = palavras[0];
            const aNome = a.n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const bNome = b.n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const aStarts = aNome.startsWith(primeiraPalavra);
            const bStarts = bNome.startsWith(primeiraPalavra);
            if (aStarts && !bStarts) return -1;
            if (!aStarts && bStarts) return 1;
            // Depois, ordem alfabética
            return a.n.localeCompare(b.n);
          });
      }, [query, activeGroup, filterLocal, filterVia, showOnlyPopular]);

      const toggleFav = (id) => {
        setFavorites(prev => prev.includes(id) ? prev.filter(f => f !== id) : [...prev, id]);
      };

      // Lista alfabética (ordenada por nome)
      const listaAlfabetica = useMemo(() => {
        return [...MEDS].sort((a, b) => a.n.localeCompare(b.n));
      }, []);

      return (
        <div className="app" style={{ background: darkMode ? '#0F1A15' : '#EEF2EF', minHeight: '100vh', color: darkMode ? '#DCE8E0' : '#14231D' }}>
          <header style={{ marginBottom: 22 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
              <div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                  <span style={{ fontFamily: 'monospace', fontSize: 13, fontWeight: 700, color: '#1F6F5C', background: '#DCEAE5', padding: '3px 8px', borderRadius: 4 }}>🏥 REMUME</span>
                  <span style={{ fontSize: 12, background: '#DCEAE5', padding: '2px 8px', borderRadius: 4, color: '#51665D' }}>UBS + AMA</span>
                  <span style={{ fontSize: 12, background: '#DCEAE5', padding: '2px 8px', borderRadius: 4, color: '#51665D' }}>{MEDS.length} medicamentos</span>
                </div>
                <h1 style={{ fontSize: 26, fontWeight: 800, margin: '10px 0 4px' }}>Medicamentos da rede municipal</h1>
                <p style={{ fontSize: 14, color: darkMode ? '#7A9A8A' : '#51665D' }}>UBS (oral/tópico) + AMA (injetáveis) + Inaláveis + Oftálmicos</p>
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button onClick={() => setShowLista(true)} className="btn-lista">📋 Lista alfabética</button>
                <button onClick={() => setDarkMode(!darkMode)} style={{ background: darkMode ? '#1A2E28' : '#fff', border: '1.5px solid #C7D6CF', borderRadius: 8, padding: '8px 10px', cursor: 'pointer' }}>
                  {darkMode ? '☀️' : '🌙'}
                </button>
              </div>
            </div>
          </header>

          <div style={{ display: 'flex', alignItems: 'center', gap: 8, background: darkMode ? '#1A2E28' : '#fff', border: `1.5px solid ${darkMode ? '#2A4A3E' : '#C7D6CF'}`, borderRadius: 12, padding: '10px 12px', marginBottom: 10 }}>
            <span>🔍</span>
            <input className="input-search" value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Digite o início do nome, ex: Tobramicina, Dextrana..." style={{ color: darkMode ? '#DCE8E0' : '#14231D' }} />
            {query && <button onClick={() => setQuery('')} style={{ background: 'none', border: 'none', cursor: 'pointer' }}>✕</button>}
          </div>

          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 14 }}>
            <button className={`btn-filter ${showOnlyPopular ? 'active' : ''}`} onClick={() => setShowOnlyPopular(!showOnlyPopular)}>⭐ Mais usados</button>
            <select className="btn-filter" value={filterLocal} onChange={e => setFilterLocal(e.target.value)} style={{ background: darkMode ? '#1A2E28' : '#fff', color: 'inherit' }}>
              <option value="all">📍 Todos locais</option>
              <option value="UBS">🏥 UBS</option>
              <option value="AMA">💉 AMA</option>
            </select>
            <select className="btn-filter" value={filterVia} onChange={e => setFilterVia(e.target.value)} style={{ background: darkMode ? '#1A2E28' : '#fff', color: 'inherit' }}>
              <option value="all">💊 Todas vias</option>
              <option value="Oral">Oral</option>
              <option value="Injetável">Injetável</option>
              <option value="Inalatória">Inalatória</option>
            </select>
            <span style={{ fontSize: 12, marginLeft: 'auto', color: darkMode ? '#7A9A8A' : '#51665D' }}>{results.length} resultados</span>
          </div>

          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 14 }}>
            <button className={`chip-group ${!activeGroup ? 'active' : ''}`} onClick={() => setActiveGroup(null)} style={!activeGroup ? { background: '#14231D', color: '#fff', borderColor: '#14231D' } : {}}>Todos</button>
            {groups.map(g => {
              const active = activeGroup === g;
              const color = groupColors[g] || '#51665D';
              return <button key={g} className={`chip-group ${active ? 'active' : ''}`} onClick={() => setActiveGroup(active ? null : g)} style={active ? { background: color, borderColor: color, color: '#fff' } : {}}>{g}</button>;
            })}
          </div>

          {results.length === 0 && <div style={{ padding: 32, textAlign: 'center', color: darkMode ? '#7A9A8A' : '#51665D', background: darkMode ? '#1A2E28' : '#fff', borderRadius: 12 }}>🔍 Nenhum medicamento encontrado. Tente "Tobramicina" ou "Dextrana".</div>}

          {results.map((m, i) => {
            const isOpen = openIdx === i;
            const isFav = favorites.includes(m.id);
            const isInj = ['IV','IM','IV/IM','SC'].includes(m.via);
            const color = groupColors[m.g] || '#51665D';
            return (
              <div key={m.id} className="card" style={{ borderColor: isOpen ? color : (darkMode ? '#2A4A3E' : '#DCE5E0') }} onClick={() => setOpenIdx(isOpen ? null : i)}>
                <div style={{ display: 'flex', justifyContent: 'space-between', gap: 10 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, alignItems: 'center' }}>
                      {isFav && <span>⭐</span>}
                      {m.popular && <span className="badge-popular">Popular</span>}
                      {isInj && <span className="badge-injetavel">💉 Injetável</span>}
                      {m.l === 'AMA' && <span className="badge-ama">AMA</span>}
                      {m.l === 'UBS' && <span className="badge-ubs">UBS</span>}
                      <span style={{ fontFamily: 'monospace', fontWeight: 600, fontSize: 14 }}>{m.n}</span>
                    </div>
                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, marginTop: 4, fontSize: 12, color: darkMode ? '#7A9A8A' : '#51665D' }}>
                      <span className="tag">💊 {m.forma}</span>
                      <span className="tag">{m.via}</span>
                      <span className="tag">📍 {m.l}</span>
                      <span className="tag">💰 {m.custo}</span>
                    </div>
                  </div>
                  <span style={{ fontSize: 11, fontWeight: 700, color, background: `${color}18`, padding: '4px 8px', borderRadius: 6, whiteSpace: 'nowrap' }}>{m.g}</span>
                </div>

                <div style={{ display: 'flex', gap: 8, marginTop: 8, borderTop: `1px solid ${darkMode ? '#2A4A3E' : '#DCE5E0'}`, paddingTop: 8 }}>
                  <button onClick={(e) => { e.stopPropagation(); toggleFav(m.id); }} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 12, display: 'flex', gap: 4, alignItems: 'center' }}>{isFav ? '⭐ Favorito' : '☆ Favoritar'}</button>
                  <button onClick={(e) => { e.stopPropagation(); setOpenIdx(isOpen ? null : i); }} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 12, marginLeft: 'auto' }}>{isOpen ? '🔼 Menos' : '🔽 Mais detalhes'}</button>
                </div>

                {isOpen && (
                  <div style={{ marginTop: 10, paddingTop: 10, borderTop: `2px solid ${color}` }}>
                    {m.dose && <div style={{ background: darkMode ? '#1F332C' : '#E8F4F0', padding: '8px 10px', borderRadius: 6, marginBottom: 6 }}><strong>💊 Dose:</strong> {m.dose}</div>}
                    {m.indicacoes && <div style={{ marginBottom: 6 }}><strong>✓ Indicações:</strong> {m.indicacoes.join(', ')}</div>}
                    {m.contraindicacoes && <div style={{ marginBottom: 6, color: '#E74C3C' }}><strong>⚠️ Contraindicações:</strong> {m.contraindicacoes.join(', ')}</div>}
                    {m.interacoes && m.interacoes.length > 0 && <div style={{ marginBottom: 6 }}><strong>🔄 Interações:</strong> {m.interacoes.join(', ')}</div>}
                    {m.antidotos && m.antidotos.length > 0 && <div style={{ marginBottom: 6, color: '#27AE60' }}><strong>💉 Antídotos:</strong> {m.antidotos.join(', ')}</div>}
                    {m.alerta && <div style={{ background: darkMode ? '#2A1A1A' : '#FFF3E0', padding: '8px 10px', borderRadius: 6, border: '1px solid #E67E22', color: '#E67E22', fontWeight: 600 }}>⚠️ {m.alerta}</div>}
                  </div>
                )}
              </div>
            );
          })}

          <footer style={{ marginTop: 28, fontSize: 11.5, color: darkMode ? '#3A5A4E' : '#8AA098', borderTop: `1px solid ${darkMode ? '#1A2E28' : '#DCE5E0'}`, paddingTop: 16 }}>
            <p>REMUME - SMS-SP · Dados manuais atualizados jun/2026 · {MEDS.length} medicamentos</p>
            <p style={{ marginTop: 4 }}>Dica: digite o início do nome (ex: "Tobramicina") para busca mais rápida.</p>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
