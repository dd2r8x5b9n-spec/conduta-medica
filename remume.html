      { id:"enoxaparina_60", n:"Enoxaparina sódica 60 mg seringa SC", g:"Cardiovascular", l:"AMA", forma:"Seringa preenchida", via:"SC", dose:"Adulto: 60mg SC 1x/dia (profilaxia alta)", indicacoes:["Profilaxia TVP em peso >60kg","SCA"], contraindicacoes:["Hemorragia ativa","Trombocitopenia"], interacoes:["Anticoagulantes","AINEs"], antidotos:["Sulfato de protamina"], alerta:"⚠️ Ajuste de dose por peso", popular:false, custo:"Alto" },
      { id:"furosemida_inj", n:"Furosemida 10 mg/mL solução injetável", g:"Cardiovascular", l:"AMA", forma:"Solução injetável", via:"IV/IM", dose:"Adulto: 20-40mg IV/IM (máx 200mg/dia)", indicacoes:["Edema agudo pulmonar","Insuf. cardíaca"], contraindicacoes:["Anúria","Hipocalemia","Gestação"], interacoes:["Digoxina","AINEs","Lítio"], antidotos:["Eletrólitos"], alerta:"⚠️ Administrar lentamente (IV: 1-2 min)", popular:true, custo:"Baixo" },
      { id:"metoclopramida_inj", n:"Metoclopramida 5 mg/mL solução injetável", g:"Antieméticos / Antivertiginosos", l:"AMA", forma:"Solução injetável", via:"IV/IM", dose:"Adulto: 10mg IV/IM 8h", indicacoes:["Náusea","Vômito","Gastroparesia"], contraindicacoes:["Hemorragia GI","Feocromocitoma","Parkinson"], interacoes:["Anticolinérgicos","Neurolépticos"], antidotos:["Suporte"], alerta:"⚠️ Efeitos extrapiramidais - principalmente em jovens", popular:true, custo:"Baixo" },
      { id:"ondansetrona_inj", n:"Ondansetrona 2 mg/mL solução injetável", g:"Antieméticos / Antivertiginosos", l:"AMA", forma:"Solução injetável", via:"IV/IM", dose:"Adulto: 8mg IV/IM 8-12h", indicacoes:["Náusea pós-quimioterapia","Náusea pós-cirúrgica"], contraindicacoes:["Prolongamento QT","Hipersensibilidade"], interacoes:["Antifúngicos","Antiarrítmicos","Antidepressivos"], antidotos:["Suporte"], alerta:"⚠️ Monitorar ECG - risco de arritmia", popular:false, custo:"Médio" },
      { id:"dexametasona_inj", n:"Dexametasona 4 mg/mL solução injetável", g:"Outros / Diversos", l:"AMA", forma:"Solução injetável", via:"IV/IM", dose:"Adulto: 4-8mg IV/IM 6-12h", indicacoes:["Edema cerebral","Reações alérgicas","Estado asmático"], contraindicacoes:["Infecção fúngica sistêmica"], interacoes:["AINEs","Anticoagulantes","Antidiabéticos"], antidotos:["Suporte"], alerta:"⚠️ Suspensão gradual - não interromper abruptamente", popular:true, custo:"Baixo" },
      { id:"hidrocortisona_inj", n:"Hidrocortisona 100 mg pó para solução injetável", g:"Outros / Diversos", l:"AMA", forma:"Pó para solução injetável", via:"IV/IM", dose:"Adulto: 100mg IV/IM 8h (crise)", indicacoes:["Insuf. adrenal","Estado asmático","Choque"], contraindicacoes:["Infecção fúngica sistêmica"], interacoes:["AINEs","Anticoagulantes","Antidiabéticos"], antidotos:["Suporte"], alerta:"⚠️ Emergência adrenal - administrar imediatamente", popular:false, custo:"Médio" },

      // ===== Oftálmicos (8 medicamentos) =====
      { id:"tobramicina_col", n:"Tobramicina 3 mg/mL (0,3%) solução oftálmica", g:"Oftálmico", l:"UBS", forma:"Solução oftálmica", via:"Tópica (Oftálmica)", dose:"Adulto: 1-2 gotas 4/6h", indicacoes:["Infecções oculares","Conjuntivite bacteriana"], contraindicacoes:["Hipersensibilidade"], interacoes:["Nenhuma significativa"], antidotos:["Suporte"], alerta:"⚠️ Não usar lentes de contato durante o tratamento", popular:true, custo:"Baixo" },
      { id:"cloranfenicol_col", n:"Cloranfenicol + retinol + aminoácidos + metionina pomada oftálmica", g:"Oftálmico", l:"UBS", forma:"Pomada oftálmica", via:"Tópica (Oftálmica)", dose:"Adulto: aplicar 1-2x/dia", indicacoes:["Infecções oculares","Ceratite","Conjuntivite"], contraindicacoes:["Hipersensibilidade","Gestação"], interacoes:["Nenhuma significativa"], antidotos:["Suporte"], alerta:"⚠️ Uso restrito - monitorar reações alérgicas", popular:true, custo:"Médio" },
      { id:"dexametasona_col", n:"Dexametasona 1 mg/mL (0,1%) suspensão oftálmica", g:"Oftálmico", l:"UBS", forma:"Suspensão oftálmica", via:"Tópica (Oftálmica)", dose:"Adulto: 1-2 gotas 4/6h", indicacoes:["Inflamação ocular","Alergia ocular"], contraindicacoes:["Infecção viral/fúngica ocular","Glaucoma"], interacoes:["Nenhuma significativa"], antidotos:["Suporte"], alerta:"⚠️ Agitar antes de usar - não usar em infecções não tratadas", popular:true, custo:"Médio" },
      { id:"brimonidina_col", n:"Brimonidina 2 mg/mL (0,2%) solução oftálmica", g:"Oftálmico", l:"UBS", forma:"Solução oftálmica", via:"Tópica (Oftálmica)", dose:"Adulto: 1 gota 2x/dia", indicacoes:["Glaucoma","Hipertensão ocular"], contraindicacoes:["Hipersensibilidade","Crianças <2 anos"], interacoes:["Antidepressivos","Anti-hipertensivos"], antidotos:["Suporte"], alerta:"⚠️ Monitorar pressão intraocular", popular:false, custo:"Médio" },
      { id:"timolol_col", n:"Timolol 5 mg/mL (0,5%) solução oftálmica", g:"Oftálmico", l:"UBS", forma:"Solução oftálmica", via:"Tópica (Oftálmica)", dose:"Adulto: 1 gota 2x/dia", indicacoes:["Glaucoma","Hipertensão ocular"], contraindicacoes:["Asma","Bradicardia","DPOC"], interacoes:["Beta-bloqueadores orais","Verapamil"], antidotos:["Atropina","Glucagon"], alerta:"⚠️ Pode ser absorvido sistemicamente - monitorar FC", popular:false, custo:"Médio" },
      { id:"pilocarpina_col", n:"Pilocarpina 20 mg/mL (2%) solução oftálmica", g:"Oftálmico", l:"UBS", forma:"Solução oftálmica", via:"Tópica (Oftálmica)", dose:"Adulto: 1-2 gotas 3-4x/dia", indicacoes:["Glaucoma","Hipertensão ocular"], contraindicacoes:["Uveíte","Glaucoma de ângulo fechado"], interacoes:["Anticolinérgicos"], antidotos:["Atropina (antídoto)"], alerta:"⚠️ Pode causar miopia transitória", popular:false, custo:"Médio" },
      { id:"aciclovir_oft", n:"Aciclovir 30 mg/g (3%) pomada oftálmica", g:"Oftálmico", l:"UBS", forma:"Pomada oftálmica", via:"Tópica (Oftálmica)", dose:"Adulto: aplicar 5x/dia", indicacoes:["Herpes ocular","Ceratite herpética"], contraindicacoes:["Hipersensibilidade"], interacoes:["Nenhuma significativa"], antidotos:["Suporte"], alerta:"⚠️ Aplicar ao primeiro sinal", popular:true, custo:"Médio" },
      { id:"dextrana_hipromelose", n:"Dextrana + Hipromelose (0,3%) solução oftálmica", g:"Oftálmico", l:"UBS", forma:"Solução oftálmica", via:"Tópica (Oftálmica)", dose:"Adulto: 1-2 gotas 3-4x/dia", indicacoes:["Olho seco","Lágrima artificial","Irritação ocular"], contraindicacoes:["Hipersensibilidade"], interacoes:["Nenhuma significativa"], antidotos:["Suporte"], alerta:"⚠️ Lágrima artificial - usar quando necessário", popular:true, custo:"Baixo" }
    ];

    // ================================================================
    // COMPONENTE PRINCIPAL
    // ================================================================
    function App() {
      const [query, setQuery] = useState("");
      const [activeGroup, setActiveGroup] = useState(null);
      const [openIdx, setOpenIdx] = useState(null);
      const [darkMode, setDarkMode] = useState(false);
      const [showOnlyPopular, setShowOnlyPopular] = useState(false);
      const [filterLocal, setFilterLocal] = useState('all');
      const [filterVia, setFilterVia] = useState('all');
      const [favorites, setFavorites] = useState(() => {
        try { return JSON.parse(localStorage.getItem('remume_fav') || '[]'); } catch { return []; }
      });
      const [showLista, setShowLista] = useState(false);

      useEffect(() => {
        localStorage.setItem('remume_fav', JSON.stringify(favorites));
      }, [favorites]);

      const groups = [...new Set(MEDS.map(m => m.g))].sort();
      const groupColors = {
        "Analgésicos / Antitérmicos":"#B5651D",
        "Anti-inflamatórios (AINEs)":"#8A5A2B",
        "Antibióticos":"#1F6F5C",
        "Cardiovascular":"#A62B2B",
        "Respiratório":"#2F8A8A",
        "Neurológico / Psiquiátrico":"#5C4A9E",
        "Endócrino / Hormônios":"#B2842E",
        "Gastrointestinal":"#7A5230",
        "Vitaminas e Suplementos":"#3A8A5C",
        "Antiparasitários":"#4A7C2F",
        "Antifúngicos":"#6B4E9E",
        "Anti-histamínicos":"#B23A5A",
        "Antieméticos / Antivertiginosos":"#9A6B1F",
        "Outros / Diversos":"#5A5A5A",
        "Oftálmico":"#2E86AB"
      };

      // ===== Busca melhorada =====
      const results = useMemo(() => {
        const q = query.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        return MEDS.filter(m => {
          const nome = m.n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
          const grupo = m.g.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
          const ind = (m.indicacoes || []).join(' ').toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
          const matchQ = q.length === 0 || nome.includes(q) || grupo.includes(q) || ind.includes(q);
          const matchG = !activeGroup || m.g === activeGroup;
          const matchL = filterLocal === 'all' || m.l === filterLocal || m.l.includes(filterLocal);
          const matchV = filterVia === 'all' || m.via === filterVia ||
            (filterVia === 'Injetável' && ['IV','IM','IV/IM','SC'].includes(m.via)) ||
            (filterVia === 'Oral' && m.via === 'Oral') ||
            (filterVia === 'Inalatória' && m.via === 'Inalatória');
          const matchP = !showOnlyPopular || m.popular;
          return matchQ && matchG && matchL && matchV && matchP;
        }).sort((a,b) => {
          if (q.length > 0) {
            const aNome = a.n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const bNome = b.n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const aStarts = aNome.startsWith(q);
            const bStarts = bNome.startsWith(q);
            if (aStarts && !bStarts) return -1;
            if (!aStarts && bStarts) return 1;
          }
          return a.n.localeCompare(b.n);
        });
      }, [query, activeGroup, filterLocal, filterVia, showOnlyPopular]);

      const toggleFav = (id) => {
        setFavorites(prev => prev.includes(id) ? prev.filter(f => f !== id) : [...prev, id]);
      };

      const listaAlfabetica = [...MEDS].sort((a,b) => a.n.localeCompare(b.n));

      return (
        <div className="app" style={{ background: darkMode ? '#0F1A15' : '#EEF2EF', minHeight: '100vh', color: darkMode ? '#DCE8E0' : '#14231D' }}>
          <header style={{ marginBottom: 22 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
              <div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                  <span style={{ fontFamily: 'monospace', fontSize: 13, fontWeight: 700, color: '#1F6F5C', background: '#DCEAE5', padding: '3px 8px', borderRadius: 4 }}>🏥 REMUME</span>
                  <span style={{ fontSize: 12, background: '#DCEAE5', padding: '2px 8px', borderRadius: 4, color: '#51665D' }}>UBS + AMA</span>
                  <span style={{ fontSize: 12, background: '#DCEAE5', padding: '2px 8px', borderRadius: 4, color: '#51665D' }}>{MEDS.length} medicamentos</span>
                </div>
                <h1 style={{ fontSize: 26, fontWeight: 800, margin: '10px 0 4px' }}>Medicamentos da rede municipal</h1>
                <p style={{ fontSize: 14, color: darkMode ? '#7A9A8A' : '#51665D' }}>UBS (oral/tópico) + AMA (injetáveis) + Inaláveis + Oftálmicos</p>
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button onClick={() => setShowLista(true)} className="btn-lista">📋 Lista alfabética</button>
                <button onClick={() => setDarkMode(!darkMode)} style={{ background: darkMode ? '#1A2E28' : '#fff', border: '1.5px solid #C7D6CF', borderRadius: 8, padding: '8px 10px', cursor: 'pointer' }}>
                  {darkMode ? '☀️' : '🌙'}
                </button>
              </div>
            </div>
          </header>

          <div style={{ display: 'flex', alignItems: 'center', gap: 8, background: darkMode ? '#1A2E28' : '#fff', border: `1.5px solid ${darkMode ? '#2A4A3E' : '#C7D6CF'}`, borderRadius: 12, padding: '10px 12px', marginBottom: 10 }}>
            <span>🔍</span>
            <input className="input-search" value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Digite o início do nome, ex: Tobramicina, Dextrana..." style={{ color: darkMode ? '#DCE8E0' : '#14231D' }} />
            {query && <button onClick={() => setQuery('')} style={{ background: 'none', border: 'none', cursor: 'pointer' }}>✕</button>}
          </div>

          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 14 }}>
            <button className={`btn-filter ${showOnlyPopular ? 'active' : ''}`} onClick={() => setShowOnlyPopular(!showOnlyPopular)}>⭐ Mais usados</button>
            <select className="btn-filter" value={filterLocal} onChange={e => setFilterLocal(e.target.value)} style={{ background: darkMode ? '#1A2E28' : '#fff', color: 'inherit' }}>
              <option value="all">📍 Todos locais</option>
              <option value="UBS">🏥 UBS</option>
              <option value="AMA">💉 AMA</option>
            </select>
            <select className="btn-filter" value={filterVia} onChange={e => setFilterVia(e.target.value)} style={{ background: darkMode ? '#1A2E28' : '#fff', color: 'inherit' }}>
              <option value="all">💊 Todas vias</option>
              <option value="Oral">Oral</option>
              <option value="Injetável">Injetável</option>
              <option value="Inalatória">Inalatória</option>
            </select>
            <span style={{ fontSize: 12, marginLeft: 'auto', color: darkMode ? '#7A9A8A' : '#51665D' }}>{results.length} resultados</span>
          </div>

          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 14 }}>
            <button className={`chip-group ${!activeGroup ? 'active' : ''}`} onClick={() => setActiveGroup(null)} style={!activeGroup ? { background: '#14231D', color: '#fff', borderColor: '#14231D' } : {}}>Todos</button>
            {groups.map(g => {
              const active = activeGroup === g;
              const color = groupColors[g] || '#51665D';
              return <button key={g} className={`chip-group ${active ? 'active' : ''}`} onClick={() => setActiveGroup(active ? null : g)} style={active ? { background: color, borderColor: color, color: '#fff' } : {}}>{g}</button>;
            })}
          </div>

          {results.length === 0 && <div style={{ padding: 32, textAlign: 'center', color: darkMode ? '#7A9A8A' : '#51665D', background: darkMode ? '#1A2E28' : '#fff', borderRadius: 12 }}>🔍 Nenhum medicamento encontrado. Tente "Tobramicina" ou "Dextrana".</div>}

          {results.map((m, i) => {
            const isOpen = openIdx === i;
            const isFav = favorites.includes(m.id);
            const isInj = ['IV','IM','IV/IM','SC'].includes(m.via);
            const color = groupColors[m.g] || '#51665D';
            return (
              <div key={m.id} className="card" style={{ borderColor: isOpen ? color : (darkMode ? '#2A4A3E' : '#DCE5E0') }} onClick={() => setOpenIdx(isOpen ? null : i)}>
                <div style={{ display: 'flex', justifyContent: 'space-between', gap: 10 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, alignItems: 'center' }}>
                      {isFav && <span>⭐</span>}
                      {m.popular && <span className="badge-popular">Popular</span>}
                      {isInj && <span className="badge-injetavel">💉 Injetável</span>}
                      {m.l === 'AMA' && <span className="badge-ama">AMA</span>}
                      {m.l === 'UBS' && <span className="badge-ubs">UBS</span>}
                      <span style={{ fontFamily: 'monospace', fontWeight: 600, fontSize: 14 }}>{m.n}</span>
                    </div>
                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, marginTop: 4, fontSize: 12, color: darkMode ? '#7A9A8A' : '#51665D' }}>
                      <span className="tag">💊 {m.forma}</span>
                      <span className="tag">{m.via}</span>
                      <span className="tag">📍 {m.l}</span>
                      <span className="tag">💰 {m.custo}</span>
                    </div>
                  </div>
                  <span style={{ fontSize: 11, fontWeight: 700, color, background: `${color}18`, padding: '4px 8px', borderRadius: 6, whiteSpace: 'nowrap' }}>{m.g}</span>
                </div>

                <div style={{ display: 'flex', gap: 8, marginTop: 8, borderTop: `1px solid ${darkMode ? '#2A4A3E' : '#DCE5E0'}`, paddingTop: 8 }}>
                  <button onClick={(e) => { e.stopPropagation(); toggleFav(m.id); }} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 12, display: 'flex', gap: 4, alignItems: 'center' }}>{isFav ? '⭐ Favorito' : '☆ Favoritar'}</button>
                  <button onClick={(e) => { e.stopPropagation(); setOpenIdx(isOpen ? null : i); }} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 12, marginLeft: 'auto' }}>{isOpen ? '🔼 Menos' : '🔽 Mais detalhes'}</button>
                </div>

                {isOpen && (
                  <div style={{ marginTop: 10, paddingTop: 10, borderTop: `2px solid ${color}` }}>
                    {m.dose && <div style={{ background: darkMode ? '#1F332C' : '#E8F4F0', padding: '8px 10px', borderRadius: 6, marginBottom: 6 }}><strong>💊 Dose:</strong> {m.dose}</div>}
                    {m.indicacoes && <div style={{ marginBottom: 6 }}><strong>✓ Indicações:</strong> {m.indicacoes.join(', ')}</div>}
                    {m.contraindicacoes && <div style={{ marginBottom: 6, color: '#E74C3C' }}><strong>⚠️ Contraindicações:</strong> {m.contraindicacoes.join(', ')}</div>}
                    {m.interacoes && m.interacoes.length > 0 && <div style={{ marginBottom: 6 }}><strong>🔄 Interações:</strong> {m.interacoes.join(', ')}</div>}
                    {m.antidotos && m.antidotos.length > 0 && <div style={{ marginBottom: 6, color: '#27AE60' }}><strong>💉 Antídotos:</strong> {m.antidotos.join(', ')}</div>}
                    {m.alerta && <div style={{ background: darkMode ? '#2A1A1A' : '#FFF3E0', padding: '8px 10px', borderRadius: 6, border: '1px solid #E67E22', color: '#E67E22', fontWeight: 600 }}>⚠️ {m.alerta}</div>}
                  </div>
                )}
              </div>
            );
          })}

          <footer style={{ marginTop: 28, fontSize: 11.5, color: darkMode ? '#3A5A4E' : '#8AA098', borderTop: `1px solid ${darkMode ? '#1A2E28' : '#DCE5E0'}`, paddingTop: 16 }}>
            <p>REMUME - SMS-SP · Dados manuais atualizados jun/2026 · {MEDS.length} medicamentos</p>
            <p style={{ marginTop: 4 }}>Dica: digite o início do nome (ex: "Tobramicina") para busca mais rápida.</p>
          </footer>

          {/* Modal da lista alfabética */}
          {showLista && (
            <div className="modal-overlay" onClick={() => setShowLista(false)}>
              <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                <button className="modal-close" onClick={() => setShowLista(false)}>✕</button>
                <h2 style={{ marginBottom: 16 }}>📋 Lista alfabética de medicamentos</h2>
                <div className="lista-header" style={{ display: 'flex' }}>
                  <span className="lista-nome">Nome</span>
                  <span className="lista-grupo">Grupo</span>
                  <span className="lista-local">Local</span>
                  <span className="lista-via">Via</span>
                </div>
                {listaAlfabetica.map(m => (
                  <div key={m.id} className="lista-item">
                    <span className="lista-nome">{m.n}</span>
                    <span className="lista-grupo">{m.g}</span>
                    <span className="lista-local">{m.l}</span>
                    <span className="lista-via">{m.via}</span>
                  </div>
                ))}
                <div style={{ marginTop: 16, fontSize: 12, color: '#8AA098' }}>
                  Total: {listaAlfabetica.length} medicamentos
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
